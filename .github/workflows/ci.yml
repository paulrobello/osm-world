name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Minimum Rust version from Cargo.toml rust-version field
  RUST_VERSION: "1.92"

jobs:
  checkall:
    name: Format + Typecheck + Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install system dependencies (GPU simulation)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Typecheck
        run: cargo check --all-targets

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Security audit
        # SEC-001 removed the direct quick-xml 0.39.4 dep (now 0.41). The two
        # ignored advisories still appear because `wayland-scanner` (a Linux
        # build-time proc-macro pulled by winit) transitively pulls 0.39.4 and
        # parses only its own vendored Wayland protocol XML — not untrusted
        # input. Drop once winit pulls a wayland-scanner built with quick-xml
        # >=0.41.
        #
        # SEC-008 (Phase 3a) — three further advisories are reported by
        # `cargo audit` as *warnings* (informational; they do not fail this
        # step). No fixed version is reachable without major upstream releases,
        # so they are accepted/known here:
        #   - RUSTSEC-2026-0186 (memmap2 0.5.10, unsound): transitively pinned
        #     by `osmpbf 0.3.8` (latest osmpbf). The crate we use directly is
        #     `memmap2 0.9.11` (unaffected). Drop when osmpbf releases a 0.5.x
        #     line or we migrate to a maintained PBF reader.
        #   - RUSTSEC-2026-0192 (ttf-parser 0.25.1, unmaintained): pulled by
        #     egui 0.34. Drop when egui ships a release that adopts a
        #     maintained font parser.
        #   - RUSTSEC-2024-0436 (paste 1.0.15, unmaintained): pulled via the
        #     image/ravif/rav1e chain that egui's clipboard support uses. Drop
        #     when image or ravif drops the paste dependency.
        # Re-run `cargo update -p <crate>` periodically to test whether a fixed
        # version has become reachable.
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
