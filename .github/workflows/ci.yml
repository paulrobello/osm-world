name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Minimum Rust version from Cargo.toml rust-version field
  RUST_VERSION: "1.92"

jobs:
  checkall:
    name: Format + Typecheck + Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install system dependencies (GPU simulation)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Typecheck
        run: cargo check --all-targets

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Security audit
        # SEC-001 removed the direct quick-xml 0.39.4 dep (now 0.41). The two
        # ignored advisories still appear because `wayland-scanner` (a Linux
        # build-time proc-macro pulled by winit) transitively pulls 0.39.4 and
        # parses only its own vendored Wayland protocol XML — not untrusted
        # input. Tracked by SEC-008 (Phase 3a); drop these ignores once it
        # updates wayland-scanner to a quick-xml >=0.41 branch.
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
